# Author: Bowen Ma
# Trade Ingestion Service — long-running WebSocket client
# Connects to Finnhub, receives real-time trades, flushes to Postgres + S3
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-ingestion
  namespace: trade-pipeline
  labels:
    app: trade-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trade-ingestion
  template:
    metadata:
      labels:
        app: trade-ingestion
    spec:
      containers:
        - name: trade-ingestion
          image: trade-ingestion:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pipeline-config
          env:
            - name: FINNHUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pipeline-secrets
                  key: FINNHUB_API_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pipeline-secrets
                  key: DB_PASSWORD
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: pipeline-secrets
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
