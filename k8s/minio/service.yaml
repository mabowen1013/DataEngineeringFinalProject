# Author: Bowen Ma
# Minio service — ClusterIP for API, NodePort for console access
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: trade-pipeline
  labels:
    app: minio
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      nodePort: 30901
      protocol: TCP
      name: console
