# Author: Bowen Ma
# Airflow Webserver service — NodePort for external access to UI
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: trade-pipeline
  labels:
    app: airflow-webserver
spec:
  type: NodePort
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
